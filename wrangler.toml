# Sphere Node - Cloudflare Workers configuration.
#
# Two coherent ways to use this file:
#
# 1. Deploy to Cloudflare button (recommended for owners): the button reads this
#    config, provisions a D1 database, an R2 bucket, and a KV namespace for the
#    deployer, then rewrites the resource IDs below into their own copy. The
#    placeholder `*_id` values exist only so the button has a field to rewrite.
#
# 2. Manual `wrangler deploy`: DELETE the `database_id` and KV `id` lines (or
#    leave them blank). Wrangler v4 will offer to provision the missing
#    resources on first deploy and write the real IDs back into this file.
#
# Either way, code references BINDING names (SPHERE_DB, SPHERE_CONTENT,
# SPHERE_CACHE), never resource names, so a deployer may rename the underlying
# resources freely.

name = "sphere-node-pub"
main = "src/platform/cloudflare/worker.ts"
compatibility_date = "2025-09-01"

[vars]
SPHERE_PUBLISHER_NAME = "Mariano Viola"
# Optional one-line tagline shown on the human-readable index page.
SPHERE_PUBLISHER_SUMMARY = "SPHERE_PUBLISHER_SUMMARY"
SPHERE_DEFAULT_LICENSE = "CC-BY-NC"

# SPHERE_OWNER_TOKEN is a SECRET, never a var and never committed:
#   wrangler secret put SPHERE_OWNER_TOKEN

[[d1_databases]]
binding = "SPHERE_DB"
database_name = "sphere-node-db"
database_id = "e8a5b0c6-7700-4a5d-8874-3f6f58ec4576"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "SPHERE_CONTENT"
bucket_name = "sphere-node-content"

[[kv_namespaces]]
binding = "SPHERE_CACHE"
id = "57c35d5912cd41e38208ffb2337efa3e"
